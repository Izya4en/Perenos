syntax = "proto3";

package recommendation;

service Recommender {
  rpc GetRecommendations (Request) returns (Response);
}

message Request {
  double lat = 1;
  double lng = 2;
  double radius_km = 3;
}

message Location {
  double lat = 1;
  double lng = 2;
  double score = 3;
  double predicted_turnover = 4;
  string reason = 5;
}

message Response {
  repeated Location locations = 1;
}