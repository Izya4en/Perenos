syntax = "proto3";
package recommendation;
option go_package = "geocash/internal/gen/recommendation"; // Важно: путь вашего модуля

service Recommender {
  rpc GetRecommendations (Request) returns (Response);
}

message Request {
  double lat = 1;
  double lng = 2;
  int32 radius_km = 3;
}

message Response {
  repeated Location locations = 1;
}

message Location {
  double lat = 1;
  double lng = 2;
  int32 score = 3;
  double predicted_turnover = 4;
  string reason = 5;
}
